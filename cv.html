<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Pendidikan - Lucky Aldi Pratama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="py-16 px-6">
    <div class="max-w-3xl mx-auto">
        <div class="text-center mb-12">
            <h2 class="text-3xl font-bold text-slate-900 mb-2">Riwayat Pendidikan</h2>
            <div class="h-1 w-16 bg-indigo-600 mx-auto rounded-full"></div>
        </div>

        <div class="space-y-8 relative before:absolute before:inset-y-0 before:left-4 before:w-0.5 before:bg-slate-200">
            <!-- Pendidikan 1 -->
            <div class="relative pl-12">
                <div class="absolute left-0 top-1 w-8 h-8 bg-indigo-600 rounded-full border-4 border-white flex items-center justify-center text-white text-xs">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <span class="text-xs font-bold text-indigo-600 bg-indigo-50 px-2 py-1 rounded">2021 - Sekarang</span>
                    <h3 class="text-lg font-bold mt-2">SMAN 45 JAKARTA</h3>
                    <p class="text-slate-500 text-sm italic">PELAJAR INFORMATIKA</p>
                    <p class="text-slate-600 text-sm mt-3 leading-relaxed">Fokus pada pengembangan aplikasi web, manajemen basis data, dan algoritma pemograman.</p>
                </div>
            </div>

            <!-- Pendidikan 2 -->
            <div class="relative pl-12">
                <div class="absolute left-0 top-1 w-8 h-8 bg-indigo-600 rounded-full border-4 border-white flex items-center justify-center text-white text-xs">
                    <i class="fas fa-code"></i>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <span class="text-xs font-bold text-indigo-600 bg-indigo-50 px-2 py-1 rounded">2023 (6 Bulan)</span>
                    <h3 class="text-lg font-bold mt-2">REMAJA MASJID</h3>
                    <p class="text-slate-500 text-sm italic">MAULID NABI</p>
                    <p class="text-slate-600 text-sm mt-3 leading-relaxed">PELAKSANAAN KEGIATAN MENGAJI </p>
                </div>
            </div>
        </div>
        
        <div class="mt-12 text-center">
            <a href="about.html" class="text-indigo-600 font-semibold hover:underline"><i class="fas fa-arrow-left mr-2"></i> Kembali ke Profil</a>
        </div>
    </div>
</body>
</html>
